<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dankpad.Xyz</title>

<style>
* {
  margin: 0;
}
body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background-color: #050807;
  color: #b8ffcc;
  font-size: 12px;
  font-family: sans-serif;
}
.page {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 0;
}
.layout {
  display: flex;
  align-items: flex-start;
}
.main {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.content {
  border: 1px solid #1f3a2e;
  width: 685px;
  background-color: #0f1714;
  text-align: left;
}
.opt-bottom {
  background-color: #13221c;
  color: #d6ffe6;
  border-bottom: 1px solid #000;
  padding: 5px 0 5px 6px;
}
.section {
  padding: 8px;
  border-top: 1px solid #1f3a2e;
  background-color: #0f1714;
}
.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 180px;
  font-size: 18px;
  color: #7aa88c;
}
a {
  color: #7dffb2;
  text-decoration: none;
}
a:hover {
  color: #d6ffe6;
  text-decoration: underline;
}
hr {
  border: none;
  height: 1px;
  background-color: #1f3a2e;
  margin: 10px 0;
}
.footer {
  text-align: center;
  padding: 8px;
  font-size: 11px;
  color: #7aa88c;
  border-top: 1px solid #13221c;
}
</style>

</head>

<body>
<div class="page">
  <div class="layout">
    <div class="main">
      <img src="../../../../media/head.png" width="494">
      <hr>
      <div class="content">
        <div class="opt-bottom">
          <strong>/anons</strong>
        </div>
        <div class="center">
            Coming soon...
        </div>
        <div class="section">
          <a href="../index.html">back</a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  © 2026 Dankpad.Xyz. All rights reserved.
</div>

</body>
</html>
